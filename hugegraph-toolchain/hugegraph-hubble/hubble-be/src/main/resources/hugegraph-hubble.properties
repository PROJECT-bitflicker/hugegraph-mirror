server.host=localhost
server.port=8088
# SECURITY: Keep this HTTP listener private. Production/public access requires an
# HTTPS reverse proxy with secure session-cookie handling and no direct port bypass.

# SECURITY: The Kubernetes token API is hard-disabled in code. Do not restore it
# without server-side privileged authorization and dedicated security review.

graph_connection.ip_white_list=[*]
graph_connection.port_white_list=[-1]

client.request_timeout=310
client.url_cache_max_entries=1024

gremlin.suffix_limit=250
gremlin.vertex_degree_limit=100
gremlin.edges_total_limit=500
gremlin.batch_query_ids=100

langchain.python_path=python3
langchain.script_dir=langchaincode
langchain.script_allowlist=[excute_langchain.py]
langchain.execute_timeout=30

server.protocol=http
#ssl.client_truststore_file=
#ssl.client_truststore_password=

cluster=hg
idc=bddwd

# ===== Deployment Mode =====
# Set to false for standalone RocksDB mode (no PD dependency)
pd.enabled=false
# Direct server URL, only used when pd.enabled=false
server.direct_url=http://127.0.0.1:8080

# pd
pd.peers=127.0.0.1:8686
pd.server=127.0.0.1:8620

# Native operations aggregation. Keep PD/Store passwords outside source control
# in production. PD/Store 1.7 also require a trusted management network until
# strong upstream service-identity validation is enabled.
operations.connect_timeout_ms=1500
operations.read_timeout_ms=2500
operations.max_response_bytes=1048576
operations.cache_ttl_seconds=5
operations.cache_max_entries=1024
operations.store_threads=16
operations.store_deadline_ms=5000
# Operator-managed trust root for Store metrics. The defaults are local-test
# only; production must list every trusted Store scheme, host, and port.
operations.store.allowed_targets=[http://127.0.0.1:8520,http://[::1]:8520]
operations.pd.username=hubble
operations.pd.password=
operations.store.username=hubble
operations.store.password=

# dashboard
dashboard.address=127.0.0.1:8092
# BOTH, NODE_PORT, DDS
route.type=NODE_PORT

# Set monitor url
monitor.url=
prometheus.url=http://127.0.0.1:8090

# ES
es.urls=

proxy.servlet_url=/api/v1.3/ingest/*
proxy.target_url=WhatURLAtHere
